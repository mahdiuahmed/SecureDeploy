# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: securedeploy-app
  labels:
    app: securedeploy-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: securedeploy-app
  # Rolling updates = zero downtime
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: securedeploy-app
    spec:
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: IMAGE_URI   # replaced by pipeline: sed -i "s|IMAGE_URI|$ECR_IMAGE|g"
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          # Container-level security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Resource limits (prevent runaway containers)
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # Liveness: kill container if this fails
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          # Readiness: don't route traffic until this passes
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: securedeploy-app
spec:
  type: NodePort
  selector:
    app: securedeploy-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
